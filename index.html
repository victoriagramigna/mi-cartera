const num = v => parseFloat(String(v??'0').replace(/[,$\s]/g,''))||0;
const pct = v => v==null||isNaN(v)?'—':`${v>=0?'+':''}${v.toFixed(2)}%`;
const money = (v,d=0) => {
  if(v==null||isNaN(v)) return '—';
  const s=Math.abs(v).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});
  return (v<0?'-$':'$')+s;
};
const moneyUSD = (v,d=0) => {
  if(v==null||isNaN(v)||v===0) return '—';
  const s=Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  return (v<0?'-U$S ':'U$S ')+s;
};
const sc = v => v>0?C.green:v<0?C.red:C.sub;

// ── MEP fetch ──────────────────────────────────────────────────────────────
async function fetchMEP() {
  try {
    // Try dolarapi.com (no-cors friendly)
    const res = await fetch('https://dolarapi.com/v1/dolares/bolsa');
    if(res.ok) {
      const d = await res.json();
      const rate = d?.venta || d?.compra || d?.valor;
      if(rate && rate > 0) return { rate: parseFloat(rate), source: 'dolarapi.com', ts: new Date() };
    }
  } catch(e) {}
  // Fallback: return null so we use manual
  return null;
}

// ── Google Sheets API ───────────────────────────────────────────────────────
function extractSheetId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
  if(m) return m[1];
  throw new Error('URL inválida. Usá la URL de edición: docs.google.com/spreadsheets/d/.../edit');
}

async function fetchSheet(url, apiKey) {
  if(!apiKey||!apiKey.trim()) throw new Error('Ingresá tu API Key de Google.');
  const id = extractSheetId(url.trim());
  const apiUrl = `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/A1:Z1000?key=${apiKey.trim()}`;
  const res = await fetch(apiUrl);
  if(res.status===403) throw new Error('API Key inválida o sin permisos para Google Sheets API.');
  if(res.status===404) throw new Error('Hoja no encontrada. Verificá que esté compartida como "Cualquiera con el link puede ver".');
  if(!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `Error ${res.status}`);
  }
  const json = await res.json();
  const rows = json.values;
  if(!rows||rows.length<2) throw new Error('La hoja está vacía.');
  const normalize = s => s.toLowerCase().trim()
    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u');
  const headers = rows[0].map(normalize);
  const ALIASES = {
    ticker:['ticker','simbolo','symbol','activo','nombre','name','instrumento'],
    tipo:['tipo','type','categoria','clase'],
    precio:['precio','price','cotizacion','ultimo','close','valor_cuota','last'],
    cantidad:['cantidad','qty','tenencia','unidades'],
    costo_prom:['costo_prom','precio_promedio','costo promedio','avg_cost','ppc','costo_unitario'],
    valor_actual:['valor_actual','valor actual','market_value','total','monto'],
    moneda:['moneda','currency','divisa'],
  };
  const pick = (row,key) => { for(const a of ALIASES[key]){ const i=headers.indexOf(a); if(i>=0&&row[i]) return row[i]; } return ''; };
  const mapped = rows.slice(1).map(row=>({
    ticker: pick(row,'ticker'),
    tipo: pick(row,'tipo')||'Otro',
    precio: num(pick(row,'precio')),
    cantidad: num(pick(row,'cantidad')),
    costo_prom: num(pick(row,'costo_prom')),
    valor_actual: num(pick(row,'valor_actual')),
    moneda: pick(row,'moneda')||'ARS',
  })).filter(r=>r.ticker&&r.precio>0&&r.cantidad>0);
  if(!mapped.length) {
    throw new Error(`Sin activos válidos. Columnas detectadas: ${headers.join(' · ')}. Necesitás al menos: ticker · precio`);
  }
  return mapped;
}

// ── Pie chart ────────────────────────────────────────────────────────────────
function PieChart({slices,size=110}){
  const r=size/2,cx=r,cy=r,ir=r*0.58; let angle=-Math.PI/2;
  const paths=slices.map(s=>{
    const sw=s.pct*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sw;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    return {...s,d:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sw>Math.PI?1:0},1 ${x2},${y2} Z`};
  });
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {paths.map((p,i)=><path key={i} d={p.d} fill={p.color} opacity={0.9} stroke={C.bg} strokeWidth={1.5}/>)}
    <circle cx={cx} cy={cy} r={ir} fill={C.card}/>
  </svg>;
}

}

function exportCSV(rows, mep){
  const h=['ticker','tipo','moneda','precio','cantidad','costo_prom','costo_total','valor_actual','ganancia','ganancia_pct',
           'costo_total_usd','valor_actual_usd','ganancia_usd'];
  const lines=[h.join(','),...rows.map(r=>h.map(k=>{
    const v=r[k];return typeof v==='number'?v.toFixed(2):(v??'');
  }).join(','))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=`cartera_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function exportTxCSV(txs){
  const h=['fecha','tipo_op','ticker','tipo_activo','cantidad','precio','comision','total','moneda','nota'];
  const lines=[h.join(','),...txs.map(t=>h.map(k=>{
    if(k==='total') return (num(t.cantidad)*num(t.precio)+num(t.comision)).toFixed(2);
    const v=t[k];return typeof v==='number'?v.toFixed(2):(v??'');
  }).join(','))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=`movimientos_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function App(){
  const [sheetUrl,setSheetUrl] = useState(lsGet('sheet_url')||'');
  const [assets,setAssets] = useState(DEMO);
  const [isDemo,setIsDemo] = useState(true);
  const [loading,setLoading] = useState(false);
  const [sheetErr,setSheetErr] = useState('');
  const [lastSync,setLastSync] = useState(null);
  const [showSheet,setShowSheet] = useState(false);
  const [apiKey,setApiKey] = useState(lsGet('gsheets_key')||'');
  const [transactions,setTransactions] = useState(lsGet('portfolio_txs')||[]);
  const [view,setView] = useState('cartera');
  const [filterTipo,setFilterTipo] = useState('Todos');
  const [filterTicker,setFilterTicker] = useState('');
  const [sortCol,setSortCol] = useState('valor_actual');
  const [sortDir,setSortDir] = useState('desc');
  const [toast,setToast] = useState('');
  const [txSearch,setTxSearch] = useState('');

  // USD / MEP state
  const [showUSD, setShowUSD] = useState(false);
  const [mep, setMep] = useState(lsGet('mep_manual') || 1465);
  const [mepAuto, setMepAuto] = useState(false);
  const [mepLoading, setMepLoading] = useState(false);
  const [mepSource, setMepSource] = useState('manual');

  // Privacy & cash
  const [hideAmounts, setHideAmounts] = useState(false);
  const [cashARS, setCashARS] = useState(lsGet('cash_ars') || '');
  const [showCashInput, setShowCashInput] = useState(false);

  const mask = (val) => hideAmounts ? '••••••' : val;
  const maskUSD = (val) => hideAmounts ? '••••' : val;

  const [txForm,setTxForm] = useState({
    fecha:new Date().toISOString().slice(0,10),
    tipo_op:'Compra',ticker:'',tipo_activo:'Acciones',
    cantidad:'',precio:'',comision:'',moneda:'ARS',nota:'',
  });
  const [txError,setTxError] = useState('');

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2800); };

  const refreshMEP = async () => {
    setMepLoading(true);
    const result = await fetchMEP();
    if(result) {
      setMep(result.rate);
      setMepAuto(true);
      setMepSource(result.source);
      showToast(`✓ MEP actualizado: ${money(result.rate)}`);
    } else {
      showToast('No se pudo obtener MEP automático. Usá el valor manual.');
    }
    setMepLoading(false);
  };

  useEffect(()=>{ refreshMEP(); }, []);

  const toUSD = (arsValue) => mep > 0 ? arsValue / mep : 0;

  const syncSheet = async () => {
    if(!sheetUrl.trim()) return;
    setLoading(true); setSheetErr('');
    try {
      const rows = await fetchSheet(sheetUrl.trim(), apiKey);
      lsSet('gsheets_key', apiKey);
      lsSet('sheet_url', sheetUrl.trim());
      setAssets(rows); setIsDemo(false); setLastSync(new Date());
      setShowSheet(false);
      showToast(`✓ ${rows.length} activos sincronizados`);
    } catch(e){ setSheetErr(e.message); }
    setLoading(false);
  };

  // Cartera viene SOLO de la hoja de cálculo.
  // Los movimientos registrados en la app son RECORDATORIOS — no modifican la cartera.
  // Flujo: registrás en app → lo cargás en la hoja → sincronizás → ves los cambios → borrás el movimiento.
  const enriched = useMemo(()=>{
    return assets.filter(a => a.cantidad > 0).map(a=>{
      const cantidad = a.cantidad;
      const costo_prom = a.costo_prom;
      const valor_actual = a.valor_actual>0 ? a.valor_actual : a.precio*cantidad;
      
      // Si es Cripto (moneda/stablecoin), el costo iguala al valor actual para anular la ganancia ficticia por inflación
      const costo_total = (a.tipo === 'Cripto') ? valor_actual : (costo_prom * cantidad);
      
      const ganancia = valor_actual-costo_total;
      const ganancia_pct = costo_total>0 ? (ganancia/costo_total)*100 : 0;
      const costo_total_usd = toUSD(costo_total);
      const valor_actual_usd = toUSD(valor_actual);
      const ganancia_usd = valor_actual_usd-costo_total_usd;
      return {...a,cantidad,costo_prom,valor_actual,costo_total,ganancia,ganancia_pct,
              costo_total_usd,valor_actual_usd,ganancia_usd};
    });
  },[assets,mep]);

  const totalValor=enriched.reduce((s,a)=>s+a.valor_actual,0);
  const totalCosto=enriched.reduce((s,a)=>s+a.costo_total,0);
  const totalGanancia=totalValor-totalCosto;
  const totalPct=totalCosto>0?(totalGanancia/totalCosto)*100:0;
  const totalValorUSD=toUSD(totalValor);
  const totalCostoUSD=toUSD(totalCosto);
  const totalGananciaUSD=totalValorUSD-totalCostoUSD;

  const byTipo=useMemo(()=>ASSET_TYPES.reduce((acc,t)=>{acc[t]=enriched.filter(a=>a.tipo===t).reduce((s,a)=>s+a.valor_actual,0);return acc;},{}), [enriched]);
  const pieSlices=useMemo(()=>ASSET_TYPES.filter(t=>byTipo[t]>0).map(t=>({label:t,color:TYPE_COLOR[t],pct:byTipo[t]/totalValor,val:byTipo[t]})),[byTipo,totalValor]);

  const visible=useMemo(()=>{
    let rows=enriched;
    if(filterTipo!=='Todos') rows=rows.filter(a=>a.tipo===filterTipo);
    if(filterTicker.trim()) rows=rows.filter(a=>a.ticker.toUpperCase().includes(filterTicker.toUpperCase()));
    return [...rows].sort((a,b)=>{
      const col = showUSD && sortCol==='valor_actual' ? 'valor_actual_usd'
                : showUSD && sortCol==='ganancia' ? 'ganancia_usd'
                : sortCol;
      const av=a[col]??0,bv=b[col]??0;
      return sortDir==='asc'?(av>bv?1:-1):(av<bv?1:-1);
    });
  },[enriched,filterTipo,filterTicker,sortCol,sortDir,showUSD]);

  const maxGainPct=useMemo(()=>Math.max(...enriched.map(a=>Math.abs(a.ganancia_pct)),1),[enriched]);
  const doSort=col=>{if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(col);setSortDir('desc');}};

      ticker:txForm.ticker.toUpperCase().trim(),
      cantidad:num(txForm.cantidad),precio:num(txForm.precio),comision:num(txForm.comision)};

    setTxForm(f=>({...f,ticker:'',cantidad:'',precio:'',comision:'',nota:''}));

    setView('movimientos');
  };

  const deleteTx=id=>{
    const updated=transactions.filter(t=>t.id!==id);

          {showUSD && <div style={{fontSize:14,fontWeight:700,color:'#4ade80',marginTop:2}}>{mask(moneyUSD(totalValorUSD))}</div>}

        return <>

                  <span style={{fontWeight:700,fontSize:13}}>{tipo}</span>
                  <span style={{fontSize:10,color:C.muted,marginLeft:'auto'}}>{rows.length} pos.</span>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                  <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Valor</div>
                    <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace'}}>{mask(money(val))}</div>
                    {showUSD&&<div style={{fontSize:10,color:'#4ade80',fontFamily:'monospace'}}>{mask(moneyUSD(toUSD(val),0))}</div>}
                  </div>
                  <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Invertido</div>
                    <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace',color:C.sub}}>{mask(money(cost))}</div>
                    {showUSD&&<div style={{fontSize:10,color:'#60a5fa',fontFamily:'monospace'}}>{mask(moneyUSD(toUSD(cost),0))}</div>}
                  </div>
                  <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Ganancia</div>
                    <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace',color:sc(gan)}}>{mask(money(gan))}</div>
                    {showUSD&&<div style={{fontSize:10,fontFamily:'monospace',color:sc(gan)}}>{mask(moneyUSD(toUSD(gan),0))}</div>}
                    <div style={{fontSize:10,color:sc(ganPct)}}>{pct(ganPct)}</div>
                  </div>
                </div>
              </div>;
            })}
            {cash>0&&<div style={{padding:'11px 16px',borderBottom:`1px solid ${C.border}`}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:7}}>
                <div style={{width:7,height:7,borderRadius:2,background:C.green}}/>
                <span style={{fontWeight:700,fontSize:13}}>Efectivo ARS</span>
                <span style={{fontSize:10,color:C.muted,marginLeft:'auto'}}>{totalConEfectivo>0?((cash/totalConEfectivo)*100).toFixed(1)+'%':'—'} del total</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Monto</div>
                  <div style={{fontSize:12,fontWeight:700,fontFamily:'monospace'}}>{mask(money(cash))}</div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
                <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Total</div>
                  <div style={{fontSize:13,fontWeight:800,fontFamily:'monospace'}}>{mask(money(totalConEfectivo))}</div>
                  {showUSD&&<div style={{fontSize:11,color:'#4ade80',fontFamily:'monospace',fontWeight:700}}>{mask(moneyUSD(toUSD(totalConEfectivo),0))}</div>}
                </div>
                <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Invertido</div>
                  <div style={{fontSize:13,fontWeight:800,fontFamily:'monospace',color:C.sub}}>{mask(money(totalCosto))}</div>
                  {showUSD&&<div style={{fontSize:11,color:'#60a5fa',fontFamily:'monospace',fontWeight:700}}>{mask(moneyUSD(totalCostoUSD,0))}</div>}
                </div>
                <div><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:2}}>Gan. no realiz.</div>
                  <div style={{fontSize:13,fontWeight:800,fontFamily:'monospace',color:sc(totalGanancia)}}>{mask(money(totalGanancia))}</div>
                  {showUSD&&<div style={{fontSize:11,fontFamily:'monospace',fontWeight:700,color:sc(totalGanancia)}}>{mask(moneyUSD(totalGananciaUSD,0))}</div>}
                  <div style={{fontSize:10,color:sc(totalPct)}}>{pct(totalPct)}</div>
                </div>
              </div>
            </div>
          </div>
          <div style={{marginTop:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
            <div style={{padding:'11px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:11,fontWeight:700,color:C.sub,letterSpacing:'0.07em',textTransform:'uppercase'}}>Ganancias</span>
              <div style={{display:'flex',gap:10,fontSize:10}}>
                <span style={{color:'#60a5fa'}}>&#9679; No realizada</span>
                <span style={{color:'#4ade80'}}>&#9679; Realizada</span>

            </div>
            <div style={{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:C.panel}}>

                  <div style={{fontSize:9,color:'#60a5fa',marginBottom:3}}>No realizada</div>

                </div>
                <div>
                  <div style={{fontSize:9,color:'#4ade80',marginBottom:3}}>Realizada ({ventas.length} ventas)</div>

                    :(()=>{
                      const ganReal=ventas.reduce((s,t)=>{
                        const asset=enriched.find(a=>a.ticker===t.ticker);

                        return s+(num(t.cantidad)*num(t.precio)-costo);

                        <div style={{fontSize:15,fontWeight:800,fontFamily:'monospace',color:sc(ganReal)}}>{mask(money(ganReal))}</div>
                        {showUSD&&<div style={{fontSize:11,fontFamily:'monospace',color:sc(ganReal)}}>{mask(moneyUSD(toUSD(ganReal),0))}</div>}

            )}
          </div>
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
          <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
            <table style={{width:'100%',borderCollapse:'collapse',minWidth:showUSD?820:720}}>
              <thead><tr>
                <Th onClick={()=>doSort('ticker')} sorted={sortCol==='ticker'?sortDir:null}>Ticker</Th>
                <Th>Tipo</Th>
                <Th right onClick={()=>doSort('precio')} sorted={sortCol==='precio'?sortDir:null}>Precio</Th>
                <Th right onClick={()=>doSort('cantidad')} sorted={sortCol==='cantidad'?sortDir:null}>Cant.</Th>
                <Th right onClick={()=>doSort('costo_prom')} sorted={sortCol==='costo_prom'?sortDir:null}>Costo prom.</Th>
                <Th right onClick={()=>doSort('costo_total')} sorted={sortCol==='costo_total'?sortDir:null}>
                  {showUSD ? 'Invertido USD' : 'Invertido'}
                </Th>
                <Th right onClick={()=>doSort('valor_actual')} sorted={sortCol==='valor_actual'?sortDir:null}>
                  {showUSD ? 'Valor USD' : 'Valor actual'}
                </Th>
                <Th right onClick={()=>doSort('ganancia')} sorted={sortCol==='ganancia'?sortDir:null}>
                  {showUSD ? 'Gan. USD' : 'Ganancia $'}
                </Th>
                <Th right onClick={()=>doSort('ganancia_pct')} sorted={sortCol==='ganancia_pct'?sortDir:null}>%</Th>
              </tr></thead>
              <tbody>
                {visible.map((a,i)=><tr key={a.ticker} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?'transparent':C.panel+'88'}}>
                  <td style={{padding:'11px 12px'}}>
                    <div style={{fontWeight:700,fontSize:13}}>{a.ticker}</div>
                    <div style={{fontSize:10,color:C.muted}}>{a.moneda}{a.sinPrecio?' · sin precio':''}</div>
                  </td>
                  <td style={{padding:'11px 12px'}}><Badge tipo={a.tipo}/></td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12,color:C.sub}}>
                    {a.sinPrecio?'—':money(a.precio,2)}
                  </td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12,color:C.sub}}>
                    {a.cantidad.toLocaleString('es-AR',{maximumFractionDigits:4})}
                  </td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12,color:C.sub}}>
                    {money(a.costo_prom,2)}
                  </td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12}}>
                    {showUSD
                      ? <span style={{color:'#60a5fa'}}>{mask(moneyUSD(a.costo_total_usd,0))}</span>
                      : mask(money(a.costo_total))
                    }
                  </td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12,fontWeight:600}}>
                    {a.sinPrecio?'—': showUSD
                      ? <span style={{color:'#4ade80'}}>{mask(moneyUSD(a.valor_actual_usd,0))}</span>
                      : mask(money(a.valor_actual))
                    }
                  </td>
                  <td style={{padding:'11px 12px',textAlign:'right',fontFamily:'monospace',fontSize:12,fontWeight:700,color:sc(a.ganancia)}}>
                    {a.sinPrecio?'—': showUSD
                      ? <span style={{color:sc(a.ganancia_usd)}}>{mask(moneyUSD(a.ganancia_usd,0))}</span>
                      : mask(money(a.ganancia))
                    }
                  </td>
                  <td style={{padding:'11px 12px',minWidth:110}}>
                    {a.sinPrecio?<span style={{color:C.muted}}>—</span>:<MiniBar val={a.ganancia_pct} max={maxGainPct} color={sc(a.ganancia_pct)}/>}
                  </td>
                </tr>)}
              </tbody>
              <tfoot><tr style={{borderTop:`2px solid ${C.border}`,background:C.panel}}>
                <td colSpan={5} style={{padding:'10px 12px',fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em'}}>{visible.length} positions</td>
                <td style={{padding:'10px 12px',textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:12}}>
                  {showUSD
                    ? <span style={{color:'#60a5fa'}}>{mask(moneyUSD(visible.reduce((s,a)=>s+a.costo_total_usd,0),0))}</span>
                    : mask(money(visible.reduce((s,a)=>s+a.costo_total,0)))
                  }
                </td>
                <td style={{padding:'10px 12px',textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:12}}>
                  {showUSD
                    ? <span style={{color:'#4ade80'}}>{mask(moneyUSD(visible.reduce((s,a)=>s+a.valor_actual_usd,0),0))}</span>
                    : mask(money(visible.reduce((s,a)=>s+a.valor_actual,0)))
                  }
                </td>
                <td style={{padding:'10px 12px',textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:12,color:sc(totalGanancia)}}>
                  {showUSD
                    ? <span style={{color:sc(totalGananciaUSD)}}>{mask(moneyUSD(visible.reduce((s,a)=>s+(a.ganancia_usd||0),0),0))}</span>
                    : mask(money(visible.reduce((s,a)=>s+a.ganancia,0)))
                  }
                </td>
                <td/>
              </tr></tfoot>
            </table>
          </div>
          {visible.length===0&&<p style={{color:C.muted,padding:32,textAlign:'center',margin:0}}>Sin resultados.</p>}
        </div>

        {/* Mejores / Peores */}
        {enriched.length>=2&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}>
          {[{title:'Mejores',rows:[...enriched].filter(a=>!a.sinPrecio).sort((a,b)=>b.ganancia_pct-a.ganancia_pct).slice(0,3)},
            {title:'Peores',rows:[...enriched].filter(a=>!a.sinPrecio).sort((a,b)=>a.ganancia_pct-b.ganancia_pct).slice(0,3)}].map(({title,rows})=>
            <div key={title} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 16px'}}>
              <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>{title}</div>
              {rows.map(a=><div key={a.ticker} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${C.border}`}}>
                <div><div style={{fontWeight:700,fontSize:13}}>{a.ticker}</div><div style={{fontSize:10,color:C.muted}}>{a.tipo}</div></div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'monospace',fontWeight:700,fontSize:12,color:sc(a.ganancia_pct)}}>{pct(a.ganancia_pct)}</div>
                  <div style={{fontSize:11,color:C.sub}}>
                    {showUSD ? mask(moneyUSD(a.ganancia_usd,0)) : mask(money(a.ganancia))}
                  </div>
                </div>
              </div>)}
            </div>
          )}
        </div>}
      </div>}

      {/* ── VIEW: Movimientos ── */}
      {view==='movimientos'&&<div style={{marginTop:12}}>
        <div style={{background:'#0f2318',border:`1px solid #22c55e55`,borderRadius:10,padding:'11px 14px',marginBottom:12,display:'flex',gap:10,alignItems:'center'}}>
          <span style={{fontSize:15}}>📋</span>
          <div style={{fontSize:12,color:'#86efac',lineHeight:1.5}}>
            <strong>Recordatorios</strong> — no modifican tu cartera.<br/>
            Cargalos en la hoja → sincronizá → borrá el movimiento con ✕
          </div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center'}}>
          <input value={txSearch} onChange={e=>setTxSearch(e.target.value)} placeholder="Buscar…"
            style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,
              padding:'8px 12px',color:C.white,fontSize:13,outline:'none',fontFamily:'inherit',flex:1}}/>
          <button onClick={()=>exportTxCSV(filteredTxs)} style={{background:'transparent',border:`1px solid ${C.border}`,color:C.sub,borderRadius:7,padding:'8px 12px',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>↓ CSV</button>
          <button onClick={()=>setView('agregar')} style={{background:C.accent,color:'#fff',border:'none',borderRadius:7,padding:'8px 12px',fontWeight:700,fontSize:12,cursor:'pointer'}}>+ Nueva</button>
        </div>
        {filteredTxs.length===0
          ?<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:40,textAlign:'center'}}>
            <p style={{color:C.muted,margin:'0 0 16px'}}>{transactions.length===0?'Aún no registraste operaciones.':'Sin resultados.'}</p>
            {transactions.length===0&&<button onClick={()=>setView('agregar')} style={{background:C.accent,color:'#fff',border:'none',borderRadius:7,padding:'10px 20px',cursor:'pointer',fontWeight:700,fontSize:13}}>Registrar primera operación</button>}
          </div>
          :<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:'hidden'}}>
            <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:560}}>
                <thead><tr>{['Fecha','Op.','Ticker','Tipo','Cant.','Precio','Total','Nota',''].map((h,i)=>
                  <th key={i} style={{padding:'9px 11px',textAlign:i>3?'right':'left',fontSize:10,color:C.muted,fontWeight:700,letterSpacing:'0.07em',textTransform:'uppercase',borderBottom:`1px solid ${C.border}`}}>{h}</th>
                )}</tr></thead>
                <tbody>
                  {filteredTxs.map((t,i)=>{
                    const total=num(t.cantidad)*num(t.precio)+num(t.comision);
                    return <tr key={t.id} style={{borderTop:`1px solid ${C.border}`,background:i%2===0?'transparent':C.panel+'66'}}>
                      <td style={{padding:'10px 11px',fontSize:11,color:C.sub,whiteSpace:'nowrap'}}>{t.fecha}</td>
                      <td style={{padding:'10px 11px'}}><span style={{fontWeight:700,fontSize:12,color:t.tipo_op==='Compra'?C.green:C.red}}>{t.tipo_op}</span></td>
                      <td style={{padding:'10px 11px',fontWeight:700,fontSize:13}}>{t.ticker}</td>
                      <td style={{padding:'10px 11px'}}><Badge tipo={t.tipo_activo}/></td>
                      <td style={{padding:'10px 11px',textAlign:'right',fontFamily:'monospace',fontSize:12}}>{num(t.cantidad).toLocaleString('es-AR',{maximumFractionDigits:4})}</td>
                      <td style={{padding:'10px 11px',textAlign:'right',fontFamily:'monospace',fontSize:12}}>{money(t.precio,2)}</td>
                      <td style={{padding:'10px 11px',textAlign:'right',fontFamily:'monospace',fontSize:12,fontWeight:700}}>{money(total)}</td>
                      <td style={{padding:'10px 11px',fontSize:11,color:C.sub,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.nota||'—
